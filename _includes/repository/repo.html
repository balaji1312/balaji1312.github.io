{% assign repo_url = include.repository | split: '/' %}

<div class="repo p-2">
  <a class="repo-card" href="https://github.com/{{ include.repository }}" target="_blank" rel="noopener noreferrer" data-owner="{{ repo_url.first }}" data-repo="{{ repo_url.last }}">
    <div class="repo-card-header">
      <i class="fas fa-book repo-icon"></i>
      <span class="repo-name"><span class="repo-owner">{{ repo_url.first }}/</span><span class="repo-reponame">{{ repo_url.last }}</span></span>
    </div>
    <p class="repo-description"></p>
    <div class="repo-stats">
      <span class="repo-lang"></span>
      <span class="repo-stars"><i class="far fa-star"></i>&nbsp;<span class="repo-stars-count">—</span></span>
      <span class="repo-forks"><i class="fas fa-code-branch"></i>&nbsp;<span class="repo-forks-count">—</span></span>
    </div>
  </a>
</div>
